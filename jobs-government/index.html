<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>Weekly Government Jobs News — natthasath-news</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400..700;1,500&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{ --bg:#ECEEEC; --surface:#F6F7F5; --surface-2:#E4E7E3; --ink:#1B2027; --ink-soft:#565D63; --ink-faint:#868C8F; --line:rgba(27,32,39,0.14); --line-strong:rgba(27,32,39,0.28); --accent:#0F7A73; }
@media (prefers-color-scheme: dark){ :root{ --bg:#14171B; --surface:#1B1F24; --surface-2:#20252B; --ink:#E7E6E0; --ink-soft:#ABB0AC; --ink-faint:#7B807D; --line:rgba(231,230,224,0.14); --line-strong:rgba(231,230,224,0.26); --accent:#3FBDAF; } }

*{ box-sizing:border-box; }
html{ background:var(--bg); }
body{ margin:0; background:var(--bg); color:var(--ink); font-family:"IBM Plex Sans Thai",sans-serif; font-size:16px; line-height:1.75; }
.page{ max-width:900px; margin:0 auto; padding:0 20px 96px; }
a{ color:var(--accent); }

.topstrip{ display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line); font-family:"JetBrains Mono",monospace; font-size:11.5px; color:var(--ink-faint); }
.masthead{ padding:44px 0 30px; border-bottom:1px solid var(--line-strong); }
.kicker{ font-family:"Fraunces",serif; font-style:italic; font-weight:500; font-size:15px; color:var(--accent); margin:0 0 14px; }
.kicker::before{ content:"◆ "; font-size:11px; }
h1{ font-size:clamp(28px,5vw,38px); line-height:1.2; font-weight:800; margin:0 0 16px; }
.meta-row{ display:flex; gap:20px; font-family:"JetBrains Mono",monospace; font-size:12.5px; color:var(--ink-soft); }

.entry-list{ list-style:none; margin:28px 0; padding:0; }
.entry-list li{ border-top:1px solid var(--line); padding:16px 0; display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
.entry-list li:first-child{ border-top:none; }
.entry-list .date{ font-family:"JetBrains Mono",monospace; font-size:13px; color:var(--accent); font-weight:600; }
.entry-list .label{ color:var(--ink); flex:1; }

footer{ margin-top:50px; padding-top:22px; border-top:1px solid var(--line-strong); font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--ink-faint); }
</style>
</head>
<body>

  <header class="masthead">

    <h1>Weekly Government Jobs News</h1>
